<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Sentiment Analysis Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: white;
            padding: 30px 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #667eea;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-label {
            color: #999;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .stat-subtext {
            color: #999;
            font-size: 0.85em;
            margin-top: 5px;
        }

        /* Charts Section */
        .section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 30px;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background: #f5f5f5;
            border-top: 2px solid #667eea;
            border-bottom: 2px solid #667eea;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9f9f9;
        }

        /* Recommendations */
        .recommendation {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .recommendation h4 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .recommendation p {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 8px;
        }

        .recommendation-action {
            color: #764ba2;
            font-weight: 600;
            font-size: 0.9em;
        }

        /* Sentiment Distribution */
        .sentiment-box {
            display: inline-block;
            padding: 15px 20px;
            margin: 10px 10px 10px 0;
            border-radius: 5px;
            color: white;
            font-weight: 600;
            text-align: center;
            min-width: 150px;
        }

        .extreme-fear { background: #8B0000; }
        .fear { background: #FF6B6B; }
        .neutral { background: #FFD93D; color: #333; }
        .greed { background: #95E1D3; color: #333; }
        .extreme-greed { background: #38A169; }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .section {
                padding: 15px;
            }
            
            .chart-container {
                height: 300px;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px;
            }
        }

        /* Footer */
        footer {
            text-align: center;
            color: white;
            padding: 20px;
            margin-top: 40px;
            font-size: 0.9em;
        }

        .positive { color: #38A169; font-weight: bold; }
        .negative { color: #E53E3E; font-weight: bold; }
        .neutral-text { color: #ED8936; font-weight: bold; }

    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📊 Trader Sentiment Analysis</h1>
            <p class="subtitle">Bitcoin Fear & Greed Index vs Trading Performance</p>
            <p id="last-updated" style="color: #999; font-size: 0.9em; margin-top: 10px;"></p>
        </header>

        <!-- Main Content -->
        <div id="content" class="loading">
            <div class="spinner"></div>
            <p>Loading dashboard data...</p>
        </div>
    </div>

    <footer>
        <p>💡 Smart Trading Strategies Based on Market Sentiment Analysis</p>
        <p>Generated using Bitcoin Fear & Greed Index & Hyperliquid Historical Data</p>
    </footer>

    <script>
        // Sample insights data (will be replaced with actual data)
        const sampleInsights = {
            "metadata": {
                "generated_at": new Date().toISOString(),
                "total_records": 1500,
                "total_days": 180
            },
            "insights": {
                "total_days_analyzed": 180,
                "date_range": {
                    "start": "2024-01-01",
                    "end": "2024-06-29"
                },
                "risk_metrics": {
                    "total_pnl": 15400.50,
                    "total_trades": 450,
                    "win_rate": 58.5,
                    "total_volume": 850000,
                    "avg_trade_size": 1888.89,
                    "sharpe_ratio": 1.45
                },
                "performance_by_sentiment": {
                    "Extreme Fear": {
                        "avg_pnl_pct": 2.15,
                        "total_pnl": 3200,
                        "win_rate": 62.5,
                        "trade_count": 40,
                        "volume": 75000
                    },
                    "Fear": {
                        "avg_pnl_pct": 1.85,
                        "total_pnl": 5600,
                        "win_rate": 60.2,
                        "trade_count": 120,
                        "volume": 250000
                    },
                    "Neutral": {
                        "avg_pnl_pct": 1.20,
                        "total_pnl": 3200,
                        "win_rate": 55.0,
                        "trade_count": 150,
                        "volume": 300000
                    },
                    "Greed": {
                        "avg_pnl_pct": 0.85,
                        "total_pnl": 2200,
                        "win_rate": 52.5,
                        "trade_count": 100,
                        "volume": 150000
                    },
                    "Extreme Greed": {
                        "avg_pnl_pct": -0.50,
                        "total_pnl": 1200,
                        "win_rate": 48.5,
                        "trade_count": 40,
                        "volume": 75000
                    }
                },
                "correlations": {
                    "sentiment_value_vs_pnl": 0.342,
                    "momentum_vs_returns": 0.285,
                    "volatility_vs_returns": -0.165
                },
                "sentiment_distribution": {
                    "Fear": 140,
                    "Neutral": 95,
                    "Greed": 60,
                    "Extreme Fear": 35,
                    "Extreme Greed": 15
                },
                "recommendations": [
                    {
                        "title": "Best Sentiment Environment",
                        "description": "Trading performance is highest during Extreme Fear sentiment",
                        "action": "Increase position sizing and take more trades during Extreme Fear phases"
                    },
                    {
                        "title": "Worst Sentiment Environment",
                        "description": "Trading performance is lowest during Extreme Greed sentiment",
                        "action": "Reduce risk or avoid trading during Extreme Greed phases"
                    },
                    {
                        "title": "Solid Win Rate",
                        "description": "Current win rate is 58.5%, above 50% threshold",
                        "action": "Maintain discipline; consider slightly increasing position size"
                    },
                    {
                        "title": "High Volatility Strategy",
                        "description": "Trading performance is better during high volatility periods",
                        "action": "Increase activity and position size during volatile market conditions"
                    }
                ]
            }
        };

        // Load and display insights
        function loadInsights() {
            // Try to load from JSON file, fallback to sample data
            fetch('../output/insights.json')
                .then(response => response.json())
                .then(data => renderDashboard(data.insights || data))
                .catch(error => {
                    console.log('Loading sample data...');
                    renderDashboard(sampleInsights.insights);
                });
        }

        function renderDashboard(insights) {
            const content = document.getElementById('content');
            
            // Update last updated time
            document.getElementById('last-updated').textContent = 
                'Last Updated: ' + new Date().toLocaleString();

            let html = '';

            // Key Metrics
            html += renderStatsGrid(insights);

            // Sentiment Distribution
            html += renderSentimentDistribution(insights);

            // Performance Charts
            html += renderPerformanceCharts(insights);

            // Recommendations
            html += renderRecommendations(insights);

            // Performance Tables
            html += renderPerformanceTables(insights);

            content.innerHTML = html;

            // Initialize charts after rendering
            setTimeout(initializeCharts, 100);
        }

        function renderStatsGrid(insights) {
            const metrics = insights.risk_metrics;
            
            return `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total PnL</div>
                        <div class="stat-value positive">$${metrics.total_pnl.toLocaleString()}</div>
                        <div class="stat-subtext">${metrics.total_trades} trades</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Win Rate</div>
                        <div class="stat-value positive">${metrics.win_rate}%</div>
                        <div class="stat-subtext">Profitable trades</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Total Volume</div>
                        <div class="stat-value">$${(metrics.total_volume/1000).toFixed(1)}K</div>
                        <div class="stat-subtext">USD traded</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Avg Trade Size</div>
                        <div class="stat-value">$${metrics.avg_trade_size.toLocaleString()}</div>
                        <div class="stat-subtext">Per trade</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Sharpe Ratio</div>
                        <div class="stat-value positive">${metrics.sharpe_ratio}</div>
                        <div class="stat-subtext">Risk-adjusted return</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Period Analyzed</div>
                        <div class="stat-value">${insights.total_days_analyzed} Days</div>
                        <div class="stat-subtext">${insights.date_range.start} to ${insights.date_range.end}</div>
                    </div>
                </div>
            `;
        }

        function renderSentimentDistribution(insights) {
            let html = `
                <div class="section">
                    <h2>📈 Market Sentiment Distribution</h2>
                    <div>
            `;
            
            const dist = insights.sentiment_distribution;
            const sentimentClasses = {
                'Extreme Fear': 'extreme-fear',
                'Fear': 'fear',
                'Neutral': 'neutral',
                'Greed': 'greed',
                'Extreme Greed': 'extreme-greed'
            };
            
            Object.entries(dist).forEach(([sentiment, count]) => {
                html += `<div class="sentiment-box ${sentimentClasses[sentiment] || 'neutral'}">
                    ${sentiment}<br><small>${count} days</small>
                </div>`;
            });
            
            html += `</div></div>`;
            return html;
        }

        function renderPerformanceCharts(insights) {
            return `
                <div class="section">
                    <h2>📊 Performance Analysis</h2>
                    
                    <div class="chart-container">
                        <canvas id="performanceBySentimentChart"></canvas>
                    </div>
                    
                    <div class="chart-container">
                        <canvas id="sentimentCorrelationChart"></canvas>
                    </div>
                </div>
            `;
        }

        function renderRecommendations(insights) {
            let html = `<div class="section">
                <h2>💡 Trading Strategy Recommendations</h2>`;
            
            insights.recommendations.forEach(rec => {
                html += `
                    <div class="recommendation">
                        <h4>${rec.title}</h4>
                        <p>${rec.description}</p>
                        <div class="recommendation-action">✓ ${rec.action}</div>
                    </div>
                `;
            });
            
            html += `</div>`;
            return html;
        }

        function renderPerformanceTables(insights) {
            let html = `<div class="section">
                <h2>📋 Performance by Sentiment</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Sentiment</th>
                            <th>Avg PnL %</th>
                            <th>Total PnL</th>
                            <th>Win Rate</th>
                            <th>Trades</th>
                            <th>Volume</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            Object.entries(insights.performance_by_sentiment).forEach(([sentiment, data]) => {
                const pnlClass = data.avg_pnl_pct >= 0 ? 'positive' : 'negative';
                html += `
                    <tr>
                        <td><strong>${sentiment}</strong></td>
                        <td class="${pnlClass}">${data.avg_pnl_pct.toFixed(2)}%</td>
                        <td class="${pnlClass}">$${data.total_pnl.toLocaleString()}</td>
                        <td>${data.win_rate.toFixed(1)}%</td>
                        <td>${data.trade_count}</td>
                        <td>$${(data.volume/1000).toFixed(1)}K</td>
                    </tr>
                `;
            });
            
            html += `</tbody></table></div>`;
            return html;
        }

        function initializeCharts() {
            // Performance by Sentiment Chart
            const perfContext = document.getElementById('performanceBySentimentChart');
            if (perfContext) {
                const sentiments = Object.keys(sampleInsights.insights.performance_by_sentiment);
                const avgPnl = sentiments.map(s => 
                    sampleInsights.insights.performance_by_sentiment[s].avg_pnl_pct
                );
                const winRates = sentiments.map(s => 
                    sampleInsights.insights.performance_by_sentiment[s].win_rate
                );
                
                new Chart(perfContext, {
                    type: 'bar',
                    data: {
                        labels: sentiments,
                        datasets: [
                            {
                                label: 'Avg PnL %',
                                data: avgPnl,
                                backgroundColor: '#667eea',
                                borderColor: '#667eea',
                                borderWidth: 1
                            },
                            {
                                label: 'Win Rate %',
                                data: winRates,
                                backgroundColor: '#764ba2',
                                borderColor: '#764ba2',
                                borderWidth: 1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: true },
                            title: { display: true, text: 'Performance Metrics by Sentiment' }
                        },
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
            }

            // Correlation Chart
            const corrContext = document.getElementById('sentimentCorrelationChart');
            if (corrContext) {
                const corr = sampleInsights.insights.correlations;
                const correlations = Object.values(corr);
                const labels = [
                    'Sentiment vs PnL',
                    'Momentum vs Returns',
                    'Volatility vs Returns'
                ];
                
                new Chart(corrContext, {
                    type: 'radar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Correlation Coefficient',
                            data: correlations.map(c => c * 100), // Scale for better visualization
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: { display: true, text: 'Factor Correlation Analysis' }
                        },
                        scales: {
                            r: {
                                beginAtZero: true,
                                max: 100
                            }
                        }
                    }
                });
            }
        }

        // Load insights when page loads
        window.addEventListener('load', loadInsights);
    </script>
</body>
</html>
