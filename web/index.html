<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentiment Desk — Trader Sentiment Analysis</title>
<link rel="stylesheet" href="/style.css">
<script src="/script.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">FG</div>
      <div class="brand-name">Sentiment Desk <span>/ BTC Fear &amp; Greed</span></div>
    </div>
    <div class="nav-tabs" id="navTabs">
      <button data-target="overview" class="active">Overview</button>
      <button data-target="sentiment">Sentiment</button>
      <button data-target="analysis">Analysis</button>
      <button data-target="strategy">Strategy</button>
      <button data-target="ledger">Ledger</button>
    </div>
    <div class="live-pill"><span class="live-dot"></span> LIVE <span id="clock" class="mono"></span></div>
  </div>
</div>

<div class="container">
  <div id="content" class="loading">
    <div class="spinner"></div>
    <p>Pulling sentiment &amp; trade history…</p>
  </div>
</div>

<footer>
    <script src="/script.js"></script>
  Built on the Bitcoin Fear &amp; Greed Index and Hyperliquid trade history — updated <span id="footTime" class="mono"></span>
</footer>


</body>
</html>
